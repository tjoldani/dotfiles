# Minimal Starship Config with Tokyo Night colors

add_newline = false

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$character"""

[hostname]
ssh_only = true
style = "bold #f7768e"
format = "[@$hostname]($style) "

[username]
style_user = "bold #7aa2f7"
format = "[$user]($style)"
show_always = false

[directory]
style = "bold #7BCBFC"
truncation_length = 3
truncate_to_repo = true

[git_branch]
symbol = " "
style = "bold #9ece6a"

[git_status]
style = "#bb9af7"
ahead = "⇡${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
behind = "⇣${count}"

[character]
success_symbol = "[❯](bold #7aa2f7)"
error_symbol = "[❯](bold #f7768e)"
